      // Shuffles background image array upon refreshing page
      function shuffleArray(array) {
        for (var i = array.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1)); // Generate random number
          var temp = array[i];
          array[i] = array[j];
          array[j] = temp;
        }
        return array;
        b;
      }
      var image = document.querySelector("#mainImg");
      var frame = document.querySelector("#mainFrame");

      // Clicking a button cycles through the new, shuffled list.
      function randombg() {
        if (count < bg.length) {
          count++;
        }
        if (count == bg.length) {
          count = 0;
        }
        image.src = bg[count];

        // Title
        var imgtitle = bg[count];
        var date = imgtitle.substr(0, 4);

        if (imgtitle.includes("-web")) {
          // Will check if each link has the -web extension and delete it
          imgtitle = imgtitle.substr(5, imgtitle.length - 13);
        } else {
          imgtitle = imgtitle.substr(5, imgtitle.length - 9);
        }
        if (imgtitle.includes("Durak")) {
          // Fix Durak! title
          imgtitle = "Durak!";
        }
        image.title = imgtitle + " (" + date + ")";
      }
      var mediaQuery = window.matchMedia("(min-width: 300px)");
